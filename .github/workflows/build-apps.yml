name: Build Desktop & Mobile Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ====================
  # Linux Build Job
  # ====================
  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux Apps
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Create icon directories
        run: mkdir -p src-tauri/icons

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Linux apps
        run: cargo tauri build
        continue-on-error: true

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ====================
  # Windows Build Job
  # ====================
  build-windows:
    runs-on: windows-latest
    name: Build Windows App
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Create icon directories
        run: mkdir -p src-tauri/icons
        shell: bash

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Windows app
        run: cargo tauri build
        continue-on-error: true

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ====================
  # Android Build Job
  # ====================
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor
        run: |
          bun add -D @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Next.js (static)
        run: STATIC_EXPORT=true bun run build || bun run build
        continue-on-error: true

      - name: Setup Capacitor
        run: |
          bunx cap add android || true
          bunx cap sync android || true
        continue-on-error: true

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug || echo "Android build failed"
        continue-on-error: true

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

  # ====================
  # Create Release
  # ====================
  create-release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts
        continue-on-error: true

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts
        continue-on-error: true

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: artifacts
        continue-on-error: true

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts
        continue-on-error: true

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts found"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
