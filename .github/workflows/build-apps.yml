name: Build Desktop & Mobile Apps

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows App'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux Apps'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  # ====================
  # Windows Build Job
  # ====================
  build-windows:
    if: ${{ github.event.inputs.build_windows != 'false' }}
    runs-on: windows-latest
    name: Build Windows App
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build Next.js app
        run: bun run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Windows app
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ====================
  # Linux Build Job
  # ====================
  build-linux:
    if: ${{ github.event.inputs.build_linux != 'false' }}
    runs-on: ubuntu-22.04
    name: Build Linux Apps
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libx11-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build Next.js app
        run: bun run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Linux apps (deb, rpm, AppImage)
        run: cargo tauri build

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Linux RPM
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  # ====================
  # Android Build Job
  # ====================
  build-android:
    if: ${{ github.event.inputs.build_android != 'false' }}
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: bun install

      - name: Build Next.js static export
        run: |
          bun run build
          bunx next export || echo "Using output: export mode"

      - name: Install Capacitor CLI
        run: bun add -D @capacitor/cli @capacitor/core @capacitor/android @capacitor/app @capacitor/splash-screen @capacitor/status-bar

      - name: Initialize Capacitor (if not exists)
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            bunx cap init "WebSocket Chat" "com.websocketchat.app" --web-dir=.next
          fi

      - name: Add Android platform
        run: |
          bunx cap add android || true
          bunx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: websocket-chat-android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  # ====================
  # Release Job
  # ====================
  create-release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: WebSocket Chat ${{ github.ref_name }}
          body: |
            # WebSocket Chat ${{ github.ref_name }}
            
            ## Downloads
            
            ### Windows
            - Download the `.msi` or `.exe` installer for Windows
            
            ### Linux
            - Download the `.deb` for Debian/Ubuntu
            - Download the `.rpm` for Fedora/RHEL
            - Download the `.AppImage` for universal Linux support
            
            ### Android
            - Download the `.apk` for Android devices
            
            ## What's Changed
            See the commit history for details.
            
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
